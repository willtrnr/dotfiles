---
# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json

captureBuffer: 0

startPort: 11440

globalTTL: 1800

macros:
  model: ${MODEL_ID}
  quant: Q4_K_M

  llama-server: /usr/bin/llama-server --port ${PORT} --no-ui --cpu-moe
  llama-server-hf: ${llama-server} -hf ${model}:${quant}

  large-cache: --cache-ram 2048
  small-cache: --cache-ram 512
  no-cache: --cache-ram 0

models:
  Jackrong/Qwopus3.5-9B-Coder-GGUF:
    cmd: ${llama-server-hf} ${large-cache} --ctx-size 131072 --batch-size 8192
      --ubatch-size 4096 --rope-scaling yarn --rope-scale 4 --yarn-orig-ctx
      32768
    macros:
      quant: Q6_K

  nomic-ai/nomic-embed-text-v1.5-GGUF:
    cmd: ${llama-server-hf} ${small-cache} --ctx-size 8192 --batch-size 8192
      --ubatch-size 8192 --rope-scaling yarn --rope-freq-scale 0.75 --embeddings
    macros:
      quant: Q6_K
    ttl: 300

  nomic-ai/nomic-embed-text-v2-moe-GGUF:
    cmd: ${llama-server-hf} ${small-cache} --ctx-size 512 --batch-size 512
      --ubatch-size 512 --embeddings
    macros:
      quant: Q6_K
    ttl: 300

  sweepai/sweep-next-edit-0.5B:
    cmd: ${llama-server-hf} ${small-cache}
    macros:
      quant: Q8_0
    ttl: 300

matrix:
  vars:
    qo: Jackrong/Qwopus3.5-9B-Coder-GGUF
    ne15: nomic-ai/nomic-embed-text-v1.5-GGUF
    ne2m: nomic-ai/nomic-embed-text-v2-moe-GGUF
    sn: sweepai/sweep-next-edit-0.5B

  evict_costs:
    qo: 50
    ne15: 10
    ne2m: 20
    sn: 10

  sets:
    standard: "qo & (ne15 | ne2m) & sn"
