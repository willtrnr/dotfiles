---
# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json

captureBuffer: 0

startPort: 13434

globalTTL: 1800

macros:
  model: ${MODEL_ID}
  quant: Q4_K_M

  llama-server-bin: /usr/bin/llama-server

  llama-server: |-
    ${llama-server-bin}
    --threads 4
    --flash-attn on
    --direct-io
    --parallel 1
    --no-cont-batching
    --host 127.0.0.1
    --port ${PORT}
    --reuse-port
    --no-ui
    --threads-http 4
    --jinja

  llama-server-hf: |-
    ${llama-server}
    --hf-repo ${model}:${quant}

  llama-server-hf-gguf: |-
    ${llama-server}
    --hf-repo ${model}-GGUF:${quant}

  ram-cache-none: --cache-ram 0
  ram-cache-small: --cache-ram 1024
  ram-cache-medium: --cache-ram 2048
  ram-cache-large: --cache-ram 4096
  ram-cache-xlarge: --cache-ram 8192

  kv-cache-stock: --cache-type-k q4_0 --cache-type-v q4_0
  kv-cache-turbo: --cache-type-k turbo4 --cache-type-v turbo3

  reasoning: |-
    --reasoning on
    --reasoning-budget 2048
    --reasoning-budget-message "... thinking budget exceeded, let's answer now."

  mtp: |-
    --spec-draft-n-max 2
    --spec-draft-p-min 0.8
    --n-gpu-layers-draft all
    --spec-type draft-mtp

  slot-save: |-
    --slot-save-path '${env.RUNTIME_DIRECTORY}/slots'

  qwen-common: |-
    ${ram-cache-large}
    ${kv-cache-turbo}
    ${reasoning}
    ${slot-save}
    --n-gpu-layers all
    --n-predict 16384
    --repeat-penalty 1.05
    --top-k 20
    --top-p 0.95
    --no-mmproj

  qwythos-common: |-
    ${qwen-common}
    --ctx-size 260096
    --temperature 0.2

  qwopus-common: |-
    ${qwen-common}
    --ctx-size 131072
    --rope-scaling yarn
    --rope-scale 4
    --yarn-orig-ctx 32768
    --temperature 0.6

  nomic-common: |-
    ${ram-cache-small}
    ${kv-cache-turbo}
    --n-gpu-layers all
    --log-verbosity 2
    --embeddings

  sweep-common: |-
    ${ram-cache-small}
    ${kv-cache-turbo}
    --n-gpu-layers all
    --log-verbosity 2
    --ctx-size 32768

models:
  empero-ai/Qwythos-9B-v2:
    cmd: |-
      ${llama-server-hf-gguf}
      ${qwythos-common}
      ${mtp}
    aliases:
      - Qwythos-9B-v2
    capabilities:
      in: [text]
      out: [text]
      tools: true
      context: 262144

  Jackrong/Qwopus3.5-9B-Coder:
    cmd: |-
      ${llama-server-hf-gguf}
      ${qwopus-common}
    aliases:
      - Qwopus3.5-9B-Coder
    capabilities:
      in: [text]
      out: [text]
      tools: true
      context: 131072

  nomic-ai/nomic-embed-text-v1.5:
    cmd: |-
      ${llama-server-hf-gguf}
      ${nomic-common}
      --ctx-size 8192
      --batch-size 8192
      --ubatch-size 8192
      --rope-scaling yarn
      --rope-freq-scale 0.75
    macros:
      quant: Q6_K
    ttl: 300
    aliases:
      - nomic-embed-text-v1.5
    capabilities:
      context: 8192

  sweepai/sweep-next-edit-0.5B:
    cmd: |-
      ${llama-server-hf}
      ${sweep-common}
    macros:
      quant: Q8_0
    ttl: 300
    aliases:
      - sweep-next-edit-0.5B
    capabilities:
      context: 32768

  sweepai/sweep-next-edit-1.5B:
    cmd: |-
      ${llama-server-hf}
      ${sweep-common}
    macros:
      quant: Q8_0
    ttl: 300
    aliases:
      - sweep-next-edit-1.5B
    capabilities:
      context: 32768

routing:
  router:
    use: matrix

    settings:
      matrix:
        vars:
          qm2: empero-ai/Qwythos-9B-v2
          qo35: Jackrong/Qwopus3.5-9B-Coder

          ne15: nomic-ai/nomic-embed-text-v1.5

          sne05: sweepai/sweep-next-edit-0.5B
          sne15: sweepai/sweep-next-edit-1.5B

        evict_costs:
          qm2: 50
          qo35: 50

          ne15: 10

          sne05: 10
          sne15: 20

        sets:
          standard: (+agent) & (+embed) & (+nextedit)

          agent: qm2 | qo35
          embed: ne15
          nextedit: sne05 | sne15

  scheduler:
    use: fifo

    settings:
      fifo:
        priority:
          empero-ai/Qwythos-9B-v2: 50
          Jackrong/Qwopus3.5-9B-Coder: 50
          nomic-ai/nomic-embed-text-v1.5: 10
          sweepai/sweep-next-edit-0.5B: 20
          sweepai/sweep-next-edit-1.5B: 20
