---
# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json

captureBuffer: 0

startPort: 13434

globalTTL: 1800

macros:
  model: ${MODEL_ID}
  quant: Q4_K_M

  llama-server-bin: /usr/bin/llama-server

  llama-server: |-
    ${llama-server-bin}
    --threads 4
    --flash-attn on
    --direct-io
    --fit on
    --parallel 1
    --no-cont-batching
    --host 127.0.0.1
    --port ${PORT}
    --reuse-port
    --no-ui
    --threads-http 4
    --jinja

  llama-server-hf: |-
    ${llama-server}
    --hf-repo ${model}:${quant}

  llama-server-hf-gguf: |-
    ${llama-server}
    --hf-repo ${model}-GGUF:${quant}

  ram-cache-none: --cache-ram 0
  ram-cache-small: --cache-ram 1024
  ram-cache-medium: --cache-ram 4096
  ram-cache-large: --cache-ram 8192

  kv-cache-stock: --cache-type-k q8_0 --cache-type-v q4_0
  kv-cache-turbo: --cache-type-k q8_0 --cache-type-v turbo3

  reasoning: |-
    --reasoning on
    --reasoning-budget 2048
    --reasoning-budget-message "... thinking budget exceeded, let's answer now."

  mtp-ngram: |-
    --spec-type draft-mtp,ngram-mod
    --spec-draft-n-max 2
    --spec-draft-p-min 0.8
    --spec-default

  qwen-common: |-
    ${ram-cache-large}
    ${kv-cache-turbo}
    ${reasoning}
    --batch-size 1024
    --ubatch-size 512
    --n-predict 16384
    --n-gpu-layers all
    --repeat-penalty 1.05
    --top-k 20
    --top-p 0.95
    --no-mmproj
    --ctx-checkpoints 3
    --checkpoint-min-step 32768

  qwythos-common: |-
    ${qwen-common}
    --ctx-size 196608
    --temperature 0.2

  qwopus-common: |-
    ${qwen-common}
    --ctx-size 131072
    --rope-scaling yarn
    --rope-scale 4
    --yarn-orig-ctx 32768
    --temperature 0.6

  nomic-common: |-
    ${ram-cache-small}
    --n-gpu-layers all
    --log-verbosity 2
    --ctx-checkpoints 0
    --embeddings

models:
  empero-ai/Qwythos-9B-v2:
    cmd: |-
      ${llama-server-hf-gguf}
      ${qwythos-common}
      ${mtp-ngram}
    aliases:
      - Qwythos-9B-v2
    capabilities:
      in: [text]
      out: [text]
      tools: true
      context: 262144

  Jackrong/Qwopus3.5-9B-Coder:
    cmd: |-
      ${llama-server-hf-gguf}
      ${qwopus-common}
    aliases:
      - Qwopus3.5-9B-Coder
    capabilities:
      in: [text]
      out: [text]
      tools: true
      context: 131072

  nomic-ai/nomic-embed-text-v1.5:
    cmd: |-
      ${llama-server-hf-gguf}
      ${nomic-common}
      --ctx-size 8192
      --batch-size 8192
      --ubatch-size 8192
      --rope-scaling yarn
      --rope-freq-scale 0.75
    macros:
      quant: Q8_0
    ttl: 300
    aliases:
      - nomic-embed-text-v1.5
    capabilities:
      context: 8192

routing:
  router:
    use: matrix

    settings:
      matrix:
        vars:
          qm2: empero-ai/Qwythos-9B-v2
          qo35: Jackrong/Qwopus3.5-9B-Coder

          ne15: nomic-ai/nomic-embed-text-v1.5

        evict_costs:
          qm2: 20
          qo35: 20

          ne15: 10

        sets:
          standard: (+agent) & (+embed)

          agent: qm2 | qo35
          embed: ne15

  scheduler:
    use: fifo

    settings:
      fifo:
        priority:
          empero-ai/Qwythos-9B-v2: 20
          Jackrong/Qwopus3.5-9B-Coder: 20
          nomic-ai/nomic-embed-text-v1.5: 10
