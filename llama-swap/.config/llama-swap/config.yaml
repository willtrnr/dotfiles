---
# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json

captureBuffer: 0

startPort: 13434

globalTTL: 1800

macros:
  model: ${MODEL_ID}
  quant: Q4_K_M

  llama-server-bin: /usr/bin/llama-server

  llama-server: |-
    ${llama-server-bin}
    --threads 2
    --flash-attn on
    --cache-type-k q4_0
    --cache-type-v q4_0
    --direct-io
    --fit on
    --cache-ram 1536
    --kv-unified
    --cont-batching
    --host 127.0.0.1
    --port ${PORT}
    --reuse-port
    --no-ui
    --jinja

  llama-server-hf: |-
    ${llama-server}
    --hf-repo ${model}:${quant}

  llama-server-hf-gguf: |-
    ${llama-server}
    --hf-repo ${model}-GGUF:${quant}

  gpu-only: --n-gpu-layers 999

  qwen-common: |-
    ${gpu-only}
    --parallel 2
    --temperature 0.6
    --repeat-penalty 1.05
    --top-k 20
    --top-p 0.95
    --image-min-tokens 1024
    --reasoning-preserve

  qwythos-common: |-
    ${qwen-common}
    --ctx-size 260096
    --n-predict 16384

  qwopus-common: |-
    ${qwen-common}
    --ctx-size 131072
    --n-predict 8192
    --rope-scaling yarn
    --rope-scale 4
    --yarn-orig-ctx 32768

  gemma-common: |-
    ${gpu-only}
    --temperature 1.0
    --top-k 64
    --top-p 0.95
    --ctx-size 262144
    --n-predict 8192

models:
  empero-ai/Qwythos-9B-Claude-Mythos-5-1M:
    cmd: ${llama-server-hf-gguf} ${qwythos-common}
    aliases:
      - Qwythos-9B-Claude-Mythos-5-1M
    capabilities:
      in: [text, image]
      out: [text]
      tools: true
      reranker: false
      context: 262144

  Jackrong/Qwopus3.5-9B-Coder:
    cmd: ${llama-server-hf-gguf} ${qwopus-common}
    aliases:
      - Qwopus3.5-9B-Coder
    capabilities:
      in: [text, image]
      out: [text]
      tools: true
      reranker: false
      context: 262144

  nomic-ai/nomic-embed-text-v1.5:
    cmd: |-
      ${llama-server-hf-gguf}
      --ctx-size 8192
      --batch-size 8192
      --ubatch-size 8192
      --rope-scaling yarn
      --rope-freq-scale 0.75
      --embeddings
    macros:
      quant: Q6_K
    ttl: 300
    aliases:
      - nomic-embed-text-v1.5
    capabilities:
      context: 8192

  nomic-ai/nomic-embed-text-v2-moe:
    cmd: |-
      ${llama-server-hf-gguf}
      --ctx-size 512
      --batch-size 512
      --ubatch-size 512
      --embeddings
    macros:
      quant: Q6_K
    ttl: 300
    aliases:
      - nomic-embed-text-v2-moe
    capabilities:
      context: 512

  sweepai/sweep-next-edit-0.5B:
    cmd: ${llama-server-hf} --ctx-size 32768
    macros:
      quant: Q8_0
    ttl: 300
    aliases:
      - sweep-next-edit-0.5B
    capabilities:
      context: 32768

  sweepai/sweep-next-edit-1.5B:
    cmd: ${llama-server-hf} --ctx-size 32768
    macros:
      quant: Q8_0
    ttl: 300
    aliases:
      - sweep-next-edit-1.5B
    capabilities:
      context: 32768

routing:
  router:
    use: matrix

    settings:
      matrix:
        vars:
          qy: empero-ai/Qwythos-9B-Claude-Mythos-5-1M
          qo35: Jackrong/Qwopus3.5-9B-Coder

          ne15: nomic-ai/nomic-embed-text-v1.5
          ne2e: nomic-ai/nomic-embed-text-v2-moe

          sne05: sweepai/sweep-next-edit-0.5B
          sne15: sweepai/sweep-next-edit-1.5B

        evict_costs:
          qy: 50
          qo35: 50

          ne15: 10
          ne2e: 20

          sne05: 10
          sne15: 20

        sets:
          standard: (+agent) & (+embed) & (+nextedit)

          agent: qy | qo35
          embed: ne15 | ne2e
          nextedit: sne05 | sne15

  scheduler:
    use: fifo

    settings:
      fifo:
        priority:
          empero-ai/Qwythos-9B-Claude-Mythos-5-1M: 50
          Jackrong/Qwopus3.5-9B-Coder: 50
          nomic-ai/nomic-embed-text-v1.5: 10
          nomic-ai/nomic-embed-text-v2-moe: 10
          sweepai/sweep-next-edit-0.5B: 20
          sweepai/sweep-next-edit-1.5B: 20
