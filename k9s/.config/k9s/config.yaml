k9s:
  liveViewAutoRefresh: true
  refreshRate: 2
  apiServerTimeout: 30s
  maxConnRetry: 5
  readOnly: false
  noExitOnCtrlC: false
  portForwardAddress: localhost
  ui:
    enableMouse: true
    headless: false
    logoless: true
    crumbsless: false
    splashless: true
    reactive: false
    noIcons: false
    invert: false
    defaultsToFullScreen: false
    useFullGVRTitle: false
    skin: nord
  skipLatestRevCheck: true
  disablePodCounting: false
  shellPod:
    image: docker.io/library/busybox:latest
    namespace: default
    limits:
      cpu: 100m
      memory: 100Mi
  imageScans:
    enable: false
    exclusions:
      namespaces: []
      labels: {}
  logger:
    tail: 1000
    buffer: 50000
    sinceSeconds: -1
    textWrap: false
    disableAutoscroll: false
    columnLock: false
    showTime: false
  thresholds:
    cpu:
      critical: 90
      warn: 70
    memory:
      critical: 90
      warn: 70
  defaultView: ""
